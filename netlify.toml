# Netlify: collega il repo; la build usa il backend Render indicato sotto.
# Environment variables: usa solo VITE_API_BASE_URL (il codice non legge VITE_API_URL).
# Se in dashboard hai ancora VITE_API_URL, eliminala e imposta VITE_API_BASE_URL, poi Clear cache and deploy.
# Nessuno slash finale sull’URL API.

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  VITE_API_BASE_URL = "https://fornitori-app.onrender.com"

# App a pagina singola (React senza path URL); utile se in futuro userai il router sul path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
